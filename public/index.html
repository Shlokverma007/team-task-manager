<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team Task Manager</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="app">
    <section class="panel auth-panel" id="authPanel">
      <div>
        <p class="eyebrow">Full Stack Assignment</p>
        <h1>Team Task Manager</h1>
        <p class="muted">Manage projects, assign tasks, track status, and use role-based access.</p>
      </div>

      <div class="auth-grid">
        <form id="loginForm" class="card">
          <h2>Login</h2>
          <input name="email" type="email" value="admin@test.com" placeholder="Email" required />
          <input name="password" type="password" value="123456" placeholder="Password" required />
          <button type="submit">Login</button>
        </form>

        <form id="registerForm" class="card">
          <h2>Signup</h2>
          <input name="name" placeholder="Name" required />
          <input name="email" type="email" placeholder="Email" required />
          <input name="password" type="password" placeholder="Password" required />
          <select name="role">
            <option value="member">Member</option>
            <option value="admin">Admin</option>
          </select>
          <button type="submit">Create Account</button>
        </form>
      </div>
    </section>

    <section class="workspace hidden" id="workspace">
      <header class="topbar">
        <div>
          <p class="eyebrow">Dashboard</p>
          <h1>Team Task Manager</h1>
          <p class="muted" id="userInfo"></p>
        </div>
        <button id="logoutBtn" class="secondary">Logout</button>
      </header>

      <section class="stats" id="stats"></section>

      <section class="columns">
        <form id="projectForm" class="panel">
          <h2>Create Project</h2>
          <input name="name" placeholder="Project name" required />
          <textarea name="description" placeholder="Description"></textarea>
          <button type="submit">Add Project</button>
        </form>

        <form id="taskForm" class="panel">
          <h2>Create Task</h2>
          <input name="title" placeholder="Task title" required />
          <textarea name="description" placeholder="Description"></textarea>
          <select name="project" id="projectSelect" required></select>
          <select name="assignedTo" id="userSelect"></select>
          <input name="dueDate" type="date" />
          <button type="submit">Add Task</button>
        </form>
      </section>

      <section class="columns">
        <div class="panel">
          <h2>Projects</h2>
          <div id="projectsList" class="list"></div>
        </div>

        <div class="panel">
          <h2>Tasks</h2>
          <div id="tasksList" class="list"></div>
        </div>
      </section>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
